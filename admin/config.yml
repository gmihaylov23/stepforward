backend:
  name: git-gateway
  branch: master

media_folder: images/products
public_folder: /images/products

collections:
  - name: products
    label: Продукти
    files:
      - name: products
        label: Продукти
        file: products.json
        fields:
          - name: products
            label: Продукти
            widget: list
            fields:
              - name: id
                label: ID
                widget: string
                hint: "Само малки букви и тирета, напр: mazhki-casual-01"

              - name: name
                label: Име на продукта
                widget: string

              - name: price
                label: Цена (лв.)
                widget: string
                hint: "Само числото, напр: 189"

              - name: page
                label: Страница
                widget: select
                options:
                  - { label: "Мъже", value: "men" }
                  - { label: "Жени", value: "women" }
                  - { label: "Чанти", value: "bags" }
                  - { label: "Аксесоари", value: "accessories" }
                hint: "На коя страница да се покаже продуктът"

              - name: style
                label: Стил
                widget: select
                condition:
                  field: page
                  value: [men, women]
                options:
                  - { label: "Casual", value: "casual" }
                  - { label: "Спортни", value: "sport" }
                default: "casual"
                required: false
                hint: "Секцията вътре в мъжката / женската страница"

              - name: gender_filter
                label: Пол
                widget: select
                condition:
                  field: page
                  value: [bags, accessories]
                options:
                  - { label: "И двата пола", value: "all" }
                  - { label: "Мъже", value: "men" }
                  - { label: "Жени", value: "women" }
                default: "all"
                required: false
                hint: "За кой пол е предназначена тази чанта / аксесоар"

              - name: description
                label: Описание
                widget: text

              - name: featured
                label: Покажи на началната страница
                widget: boolean
                default: false

              - name: sizes
                label: Налични размери (EU)
                widget: list
                field:
                  name: size
                  label: Размер
                  widget: string
                hint: "Добавете всеки размер отделно, напр: 40, 41, 42"

              - name: images
                label: Снимки
                widget: list
                field:
                  name: image
                  label: Снимка
                  widget: image
                hint: "Компресирайте снимките на squoosh.app — WebP, качество 80, макс 1200px"
