[build]
  publish = "."

# ── Clean URL rewrites ──
# Status 200 = rewrite (URL stays clean in browser)
# force = true = applies even when the .html file exists

[[redirects]]
  from = "/home"
  to   = "/code.html"
  status = 200
  force  = true

[[redirects]]
  from = "/man-shoes"
  to   = "/code_1.html"
  status = 200
  force  = true

